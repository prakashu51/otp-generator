name: Feature Request
description: Suggest an improvement or new feature for redis-otp-manager
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing an idea. Please describe the problem you are trying to solve and the workflow you have in mind.
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What use case or gap are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior or API you would like to see.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Mention workarounds or other approaches you considered.
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Share example payloads, app context, or related links if useful.
    validations:
      required: false
